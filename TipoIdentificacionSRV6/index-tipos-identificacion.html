<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CUC - Administrar Tipos de Identificación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(0, 40, 80, 0.85), rgba(0, 20, 50, 0.9));
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .contenedor {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.25);
            margin-bottom: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #1a4d8c, #2a6eb0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .login-info {
            background: #e8f0fe;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            color: #1a4d8c;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1a3b5c;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1.5px solid #c0d0e5;
            border-radius: 28px;
            background-color: white;
            outline: none;
        }

        .input-field:focus {
            border-color: #2a6eb0;
            box-shadow: 0 0 0 3px rgba(42, 110, 176, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(95deg, #1a4d8c, #2a6eb0);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #000;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .lista {
            margin-top: 20px;
        }

        .lista h2 {
            font-size: 18px;
            color: #1a4d8c;
            margin-bottom: 12px;
        }

        .item-card {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #e0e5ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-info {
            flex: 1;
        }

        .item-id {
            background: #1a4d8c;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 6px;
        }

        .item-nombre {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .item-acciones {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 30px;
            width: auto;
            margin-top: 0;
        }

        .mensaje {
            margin-top: 16px;
            padding: 10px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .mensaje-exito {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .mensaje-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .oculto {
            display: none;
        }

        .boton-volver {
            background: #6c757d;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="contenedor">
    <!-- Panel de Login -->
    <div class="card" id="loginCard">
        <div class="header">
            <h1>🏫 CUC</h1>
            <p>Iniciar Sesión</p>
        </div>
        <div class="input-group">
            <label>📧 Correo institucional</label>
            <input type="email" id="email" class="input-field" placeholder="admin@cuc.ac.cr" value="admin@cuc.ac.cr">
        </div>
        <div class="input-group">
            <label>🔒 Contraseña</label>
            <input type="password" id="password" class="input-field" placeholder="Contraseña" value="Admin123*">
        </div>
        <div class="input-group">
            <label>👤 Tipo de usuario</label>
            <select id="tipo" class="input-field">
                <option value="Administrador">Administrador</option>
                <option value="Funcionario">Funcionario</option>
                <option value="Estudiante">Estudiante</option>
            </select>
        </div>
        <button class="btn btn-primary" id="btnLogin">🔐 Iniciar Sesión</button>
        <div id="loginMessage" class="mensaje"></div>
    </div>

    <!-- Panel de Administración de Tipos de Identificación -->
    <div id="adminPanel" class="oculto">
        <div class="card">
            <div class="header">
                <h1>🆔 Tipos de Identificación</h1>
                <p>Administración de Tipos de Identificación</p>
            </div>
            
            <div class="login-info" id="userInfo"></div>

            <!-- Formulario para crear/editar -->
            <div class="input-group">
                <label>📝 Nombre del tipo</label>
                <input type="text" id="nombre" class="input-field" placeholder="Ej: Cédula, Pasaporte, DIMEX">
                <input type="hidden" id="editId">
            </div>
            <button class="btn btn-primary" id="btnGuardar">💾 Guardar</button>
            <button class="btn btn-secondary oculto" id="btnCancelar">❌ Cancelar</button>

            <!-- Lista de tipos -->
            <div class="lista">
                <h2>📋 Lista de Tipos de Identificación</h2>
                <div id="listaTipos"></div>
            </div>

            <button class="btn btn-secondary boton-volver" id="btnLogout">🚪 Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
    // Configuración
    const LOGIN_URL = "https://localhost:7031/api/Auth/login";
    const API_URL = "https://localhost:7179/api/TipoIdentificacion";
    let authToken = localStorage.getItem('access_token');
    let userActual = JSON.parse(localStorage.getItem('userActual') || '{}');

    // Elementos
    const loginCard = document.getElementById('loginCard');
    const adminPanel = document.getElementById('adminPanel');
    const userInfo = document.getElementById('userInfo');
    const listaTipos = document.getElementById('listaTipos');
    const nombreInput = document.getElementById('nombre');
    const editIdInput = document.getElementById('editId');
    const loginMessage = document.getElementById('loginMessage');

    let editandoId = null;

    function mostrarMensaje(elemento, texto, tipo) {
        elemento.textContent = texto;
        elemento.className = `mensaje mensaje-${tipo}`;
        setTimeout(() => {
            elemento.className = 'mensaje';
        }, 4000);
    }

    async function llamarAPI(url, metodo, data = null) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
        };
        
        const options = {
            method: metodo,
            headers: headers
        };
        
        if (data) {
            options.body = JSON.stringify(data);
        }
        
        const response = await fetch(url, options);
        return response;
    }

    async function login(email, password, tipo) {
        try {
            const response = await fetch(LOGIN_URL, {
                method: 'POST',
                headers: {
                    'accept': '*/*',
                    'usuario': email,
                    'contrasena': password,
                    'tipo': tipo
                }
            });
            
            if (response.status === 201) {
                const data = await response.json();
                authToken = data.access_token;
                userActual = { email: email, tipo: tipo };
                localStorage.setItem('access_token', authToken);
                localStorage.setItem('userActual', JSON.stringify(userActual));
                mostrarMensaje(loginMessage, '✅ Login exitoso', 'exito');
                setTimeout(() => {
                    loginCard.classList.add('oculto');
                    adminPanel.classList.remove('oculto');
                    userInfo.innerHTML = `✅ Conectado como: <strong>${email}</strong> | 🎭 ${tipo}`;
                    cargarTipos();
                }, 500);
            } else {
                const error = await response.json();
                mostrarMensaje(loginMessage, error.mensaje || 'Credenciales incorrectas', 'error');
            }
        } catch (error) {
            console.error('Login error:', error);
            mostrarMensaje(loginMessage, '❌ Error de conexión', 'error');
        }
    }

    function logout() {
        authToken = null;
        userActual = {};
        localStorage.removeItem('access_token');
        localStorage.removeItem('userActual');
        loginCard.classList.remove('oculto');
        adminPanel.classList.add('oculto');
        document.getElementById('email').value = 'admin@cuc.ac.cr';
        document.getElementById('password').value = 'Admin123*';
        cancelarEdicion();
    }

    async function cargarTipos() {
        listaTipos.innerHTML = '<div class="loading">Cargando...</div>';
        
        try {
            const response = await llamarAPI(API_URL, 'GET');
            if (response.ok) {
                const tipos = await response.json();
                if (tipos.length === 0) {
                    listaTipos.innerHTML = '<div class="loading">📭 No hay tipos de identificación registrados</div>';
                    return;
                }
                
                listaTipos.innerHTML = '';
                tipos.forEach(tipo => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <div class="item-info">
                            <div class="item-id">ID: ${tipo.id}</div>
                            <div class="item-nombre">📌 ${tipo.nombre}</div>
                        </div>
                        <div class="item-acciones">
                            <button class="btn btn-warning btn-small" onclick="editarTipo(${tipo.id}, '${tipo.nombre.replace(/'/g, "\\'")}')">✏️ Editar</button>
                            <button class="btn btn-danger btn-small" onclick="eliminarTipo(${tipo.id})">🗑️ Eliminar</button>
                        </div>
                    `;
                    listaTipos.appendChild(card);
                });
            } else if (response.status === 401) {
                mostrarMensaje(loginMessage, 'Sesión expirada, inicie sesión nuevamente', 'error');
                logout();
            } else {
                listaTipos.innerHTML = '<div class="loading">❌ Error al cargar datos</div>';
            }
        } catch (error) {
            console.error('Error cargar:', error);
            listaTipos.innerHTML = '<div class="loading">❌ Error de conexión</div>';
        }
    }

    window.editarTipo = (id, nombre) => {
        editIdInput.value = id;
        nombreInput.value = nombre;
        editandoId = id;
        document.getElementById('btnGuardar').textContent = '✏️ Actualizar';
        document.getElementById('btnCancelar').classList.remove('oculto');
    };

    window.eliminarTipo = async (id) => {
        if (!confirm('¿Está seguro de eliminar este tipo de identificación?')) return;
        
        try {
            const response = await llamarAPI(`${API_URL}/${id}`, 'DELETE');
            if (response.ok) {
                mostrarMensaje(loginMessage, '✅ Tipo eliminado correctamente', 'exito');
                cargarTipos();
                if (editandoId === id) cancelarEdicion();
            } else {
                const error = await response.json();
                mostrarMensaje(loginMessage, error.mensaje || '❌ Error al eliminar', 'error');
            }
        } catch (error) {
            console.error('Error eliminar:', error);
            mostrarMensaje(loginMessage, '❌ Error de conexión', 'error');
        }
    };

    function cancelarEdicion() {
        editIdInput.value = '';
        nombreInput.value = '';
        editandoId = null;
        document.getElementById('btnGuardar').textContent = '💾 Guardar';
        document.getElementById('btnCancelar').classList.add('oculto');
    }

    document.getElementById('btnGuardar').onclick = async () => {
        const nombre = nombreInput.value.trim();
        if (!nombre) {
            mostrarMensaje(loginMessage, '❌ El nombre es requerido', 'error');
            return;
        }
        
        try {
            let response;
            if (editandoId) {
                response = await llamarAPI(`${API_URL}/${editandoId}`, 'PUT', { nombre: nombre });
            } else {
                response = await llamarAPI(API_URL, 'POST', { nombre: nombre });
            }
            
            if (response.ok) {
                const data = await response.json();
                mostrarMensaje(loginMessage, editandoId ? '✅ Actualizado' : `✅ Creado con ID: ${data.id}`, 'exito');
                cancelarEdicion();
                cargarTipos();
            } else {
                const error = await response.json();
                mostrarMensaje(loginMessage, error.mensaje || 'Error al guardar', 'error');
            }
        } catch (error) {
            console.error('Error guardar:', error);
            mostrarMensaje(loginMessage, '❌ Error de conexión', 'error');
        }
    };

    document.getElementById('btnCancelar').onclick = cancelarEdicion;
    document.getElementById('btnLogin').onclick = () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const tipo = document.getElementById('tipo').value;
        login(email, password, tipo);
    };
    document.getElementById('btnLogout').onclick = logout;

    // Verificar sesión al cargar
    if (authToken && userActual.email) {
        loginCard.classList.add('oculto');
        adminPanel.classList.remove('oculto');
        userInfo.innerHTML = `✅ Conectado como: <strong>${userActual.email}</strong> | 🎭 ${userActual.tipo}`;
        cargarTipos();
    }
</script>
</body>
</html>
