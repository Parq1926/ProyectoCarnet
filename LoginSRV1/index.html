<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CUC - Carnet Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(0, 40, 80, 0.85), rgba(0, 20, 50, 0.9)),
                        url('https://www.cuc.ac.cr/sites/default/files/styles/imagen_destacada/public/2024-02/fachada-cuc_0.jpg') center/cover no-repeat;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.25);
            padding: 32px 24px 40px;
            transition: all 0.3s ease;
        }

        .cuc-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .cuc-logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a4d8c, #2a6eb0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .cuc-sub {
            font-size: 0.8rem;
            color: #1a4d8c;
            font-weight: 500;
        }

        .institution-name {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1a4d8c;
            background: #f0f7ff;
            padding: 10px;
            border-radius: 40px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1a3b5c;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.9rem;
            border: 1.5px solid #c0d0e5;
            border-radius: 28px;
            background-color: white;
            outline: none;
        }

        .input-field:focus {
            border-color: #2a6eb0;
            box-shadow: 0 0 0 3px rgba(42, 110, 176, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(95deg, #1a4d8c, #2a6eb0);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .message {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 16px;
            padding: 10px;
            border-radius: 30px;
            display: none;
        }

        .message-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .message-success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message-info {
            background: #eef3fc;
            color: #0c6b9e;
            display: block;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="cuc-header">
        <div class="cuc-logo">CUC</div>
        <div class="cuc-sub">Carnet Digital</div>
    </div>

    <div class="institution-name">
        🎓 Colegio Universitario de Cartago
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label>📧 Correo institucional</label>
            <input type="email" id="email" class="input-field" placeholder="admin@cuc.ac.cr" required>
        </div>

        <div class="input-group">
            <label>🔒 Contraseña</label>
            <input type="password" id="password" class="input-field" placeholder="Ingresa tu contraseña" required>
        </div>

        <div class="input-group">
            <label>👤 Tipo de usuario</label>
            <select id="tipo" class="input-field">
                <option value="Administrador">Administrador</option>
                <option value="Funcionario">Funcionario</option>
                <option value="Estudiante">Estudiante</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">INICIAR SESIÓN</button>
        <div id="message" class="message"></div>
    </form>
</div>

<script>
    const API_URL = "https://localhost:7031/api/Auth/login";

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const tipoSelect = document.getElementById('tipo');
    const messageDiv = document.getElementById('message');

    function mostrarMensaje(texto, tipo) {
        messageDiv.textContent = texto;
        messageDiv.className = `message message-${tipo}`;
        setTimeout(() => {
            messageDiv.className = 'message';
        }, 5000);
    }

    async function hacerLogin(event) {
        event.preventDefault();

        const usuario = emailInput.value.trim();
        const contrasena = passwordInput.value;
        const tipo = tipoSelect.value;

        if (!usuario || !contrasena) {
            mostrarMensaje('❌ Usuario y contraseña son requeridos', 'error');
            return;
        }

        mostrarMensaje('🔐 Validando credenciales...', 'info');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'accept': '*/*',
                    'usuario': usuario,
                    'contrasena': contrasena,
                    'tipo': tipo
                }
            });

            const data = await response.json();

            if (response.status === 201) {
                mostrarMensaje('✅ Ingreso exitoso. Bienvenido al Carnet Digital', 'success');
                
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('usuarioID', data.usuarioID);
                localStorage.setItem('userEmail', usuario);
                localStorage.setItem('userTipo', tipo);
                
                setTimeout(() => {
                    alert('🔐 Sesión iniciada correctamente');
                }, 500);
            } else {
                mostrarMensaje(data.mensaje || '❌ Usuario y/o contraseña incorrectos', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            mostrarMensaje('❌ Error de conexión con el servidor. ¿La API está corriendo?', 'error');
        }
    }

    loginForm.addEventListener('submit', hacerLogin);
</script>
</body>
</html>
